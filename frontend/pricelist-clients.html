<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>4A Express — Πελάτες</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; color: #1a1a1a; min-height: 100vh; }

  .topbar { background: #cc0000; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 42px; }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo { display: flex; align-items: center; gap: 6px; }
  .topbar-logo-box { background: white; color: #cc0000; font-size: 13px; font-weight: 800; padding: 2px 6px; border-radius: 3px; }
  .topbar-logo-text { color: white; font-size: 10px; font-weight: 600; line-height: 1.2; }
  .topbar-title { color: white; font-size: 13px; font-weight: 500; border-left: 1px solid rgba(255,255,255,0.3); padding-left: 12px; }
  .topbar-user { color: white; font-size: 11px; opacity: 0.9; }
  .topbar-logout { background: rgba(255,255,255,0.2); color: white; border: none; padding: 4px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; }

  .nav { background: white; border-bottom: 1px solid #ddd; display: flex; }
  .nav-btn { padding: 10px 18px; font-size: 13px; border: none; background: none; cursor: pointer; color: #666; border-bottom: 2px solid transparent; text-decoration: none; display: flex; align-items: center; }
  .nav-btn.active { color: #cc0000; border-bottom-color: #cc0000; font-weight: 600; }
  .nav-btn:hover { background: #f8f8f8; }

  .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

  .section-header { background: #00BCD4; color: white; font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 4px 4px 0 0; display: flex; justify-content: space-between; align-items: center; }
  .section-body { background: white; border: 1px solid #ddd; border-top: none; border-radius: 0 0 4px 4px; padding: 16px; margin-bottom: 20px; }

  .form-grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
  .form-grid2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-group input, .form-group select {
    padding: 7px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; color: #333; background: white;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #00BCD4; }

  .status-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s; user-select: none; }
  .status-pill.active { box-shadow: 0 0 0 2px #333; }
  .st-prospect  { background: #e3f2fd; color: #1565c0; border-color: #90caf9; }
  .st-negotiate { background: #fff8e1; color: #f57f17; border-color: #ffe082; }
  .st-accepted  { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
  .st-rejected  { background: #ffebee; color: #c62828; border-color: #ef9a9a; }
  .st-active    { background: #f3e5f5; color: #6a1b9a; border-color: #ce93d8; }

  .pricelist-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; align-items: center; }
  .pl-tag { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; background: #e3f2fd; color: #1565c0; display: flex; align-items: center; gap: 4px; }
  .pl-tag button { background: none; border: none; cursor: pointer; color: #c62828; font-size: 13px; padding: 0; line-height: 1; }
  .add-pl-btn { padding: 4px 10px; border-radius: 20px; font-size: 11px; border: 1px dashed #ddd; background: none; cursor: pointer; color: #888; }
  .add-pl-btn:hover { border-color: #00BCD4; color: #00BCD4; }

  .surcharges-list { margin-top: 8px; }
  .surcharge-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 8px; align-items: center; margin-bottom: 8px; }
  .surcharge-row input, .surcharge-row select { padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
  .del-btn { background: #ffebee; color: #c62828; border: none; border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 12px; }
  .add-surcharge-btn { padding: 6px 14px; background: #f0f0f0; border: 1px dashed #ddd; border-radius: 4px; font-size: 12px; cursor: pointer; color: #666; margin-top: 4px; }
  .add-surcharge-btn:hover { border-color: #00BCD4; color: #00BCD4; }

  .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; flex-wrap: wrap; }
  .btn { padding: 8px 18px; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-primary   { background: #cc0000; color: white; }
  .btn-primary:hover { background: #aa0000; }
  .btn-secondary { background: #f0f0f0; color: #555; }
  .btn-secondary:hover { background: #e0e0e0; }
  .btn-green  { background: #43a047; color: white; }
  .btn-green:hover { background: #388e3c; }
  .btn-orange { background: #ff9800; color: white; }
  .btn-orange:hover { background: #f57c00; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .offer-terms { background: #f8f8f8; border: 1px solid #e0e0e0; border-radius: 4px; padding: 12px; margin-top: 12px; }
  .offer-terms-title { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .terms-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  .managers-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .manager-tag { padding: 4px 10px; background: #f0f0f0; border-radius: 20px; font-size: 11px; color: #555; display: flex; align-items: center; gap: 4px; }
  .manager-tag button { background: none; border: none; cursor: pointer; color: #999; font-size: 12px; padding: 0; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; font-size: 11px; border: 1px solid #ddd; background: white; cursor: pointer; color: #666; }
  .filter-btn.active { background: #cc0000; color: white; border-color: #cc0000; }
  .search-input { padding: 6px 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; width: 240px; outline: none; }
  .search-input:focus { border-color: #00BCD4; }

  .client-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; gap: 12px; }
  .client-item:last-child { border-bottom: none; }
  .client-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .client-info { flex: 1; min-width: 0; }
  .client-name { font-size: 13px; font-weight: 600; color: #333; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .client-meta { font-size: 11px; color: #aaa; margin-top: 3px; }
  .client-pls  { font-size: 11px; color: #666; margin-top: 3px; }
  .client-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .action-btn { padding: 5px 10px; border-radius: 4px; font-size: 11px; border: 1px solid #ddd; background: white; cursor: pointer; color: #555; white-space: nowrap; }
  .action-btn.send { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
  .action-btn.cms  { background: #e3f2fd; color: #1565c0; border-color: #90caf9; }
  .action-btn.edit { background: #f8f8f8; color: #555; }
  .action-btn.del  { background: #ffebee; color: #c62828; border-color: #ef9a9a; }
  .renewal-badge { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
  .offer-badge   { background: #f3e5f5; color: #6a1b9a; border: 1px solid #ce93d8; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; font-family: monospace; }

  .empty { text-align: center; padding: 30px; color: #bbb; font-size: 13px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: white; border-radius: 8px; padding: 24px; width: 440px; max-height: 80vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .modal-svc-title { font-size: 12px; font-weight: 600; color: #555; margin: 10px 0 6px; }
  .modal-pl-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
  .modal-pl-name { font-size: 12px; }
  .modal-pl-date { color: #aaa; font-size: 10px; margin-left: 4px; }
  .modal-btn-add { padding: 3px 10px; border: 1px solid #90caf9; background: #e3f2fd; color: #1565c0; border-radius: 4px; font-size: 11px; cursor: pointer; }
  .modal-btn-rem { padding: 3px 10px; border: 1px solid #ef9a9a; background: #ffebee; color: #c62828; border-radius: 4px; font-size: 11px; cursor: pointer; }
  .modal-footer  { display: flex; justify-content: flex-end; margin-top: 16px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <div class="topbar-logo-box">4A</div>
      <div class="topbar-logo-text">WORLDWIDE<br>EXPRESS</div>
    </div>
    <span class="topbar-title">Διαχείριση Πελατών</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="topbar-user" id="topbar-user"></span>
    <button class="topbar-logout" onclick="doLogout()">Έξοδος</button>
  </div>
</div>

<div class="nav">
  <a class="nav-btn" href="pricelist-editor.html">+ Νέος Τιμοκατάλογος</a>
  <a class="nav-btn" href="pricelist-editor.html#shelf">📦 Ράφι</a>
  <a class="nav-btn active" href="pricelist-clients.html">👥 Πελάτες</a>
<a class="nav-btn" href="zones.html">🌍 Ζώνες</a>
</div>

<div class="container">

  <div class="section-header">
    <span id="form-title">Νέος Πελάτης</span>
    <button class="btn btn-secondary" style="padding:4px 10px;font-size:11px;" onclick="resetForm()">✕ Καθαρισμός</button>
  </div>
  <div class="section-body">

    <div class="form-grid3">
      <div class="form-group">
        <label>Επωνυμία *</label>
        <input type="text" id="cl-name" placeholder="ALPHA LOGISTICS ΑΕ" oninput="checkForm()" />
      </div>
      <div class="form-group">
        <label>ΑΦΜ *</label>
        <input type="text" id="cl-afm" placeholder="998877665" oninput="checkForm()" />
      </div>
      <div class="form-group">
        <label>Υπεύθυνος *</label>
        <input type="text" id="cl-contact" placeholder="Νίκος Παπαδόπουλος" oninput="checkForm()" />
      </div>
    </div>

    <div class="form-grid3">
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="cl-email" placeholder="nikos@company.gr" oninput="checkForm()" />
      </div>
      <div class="form-group">
        <label>Τηλέφωνο</label>
        <input type="text" id="cl-phone" placeholder="+30 210 1234567" />
      </div>
      <div class="form-group">
        <label>Website</label>
        <input type="text" id="cl-website" placeholder="www.company.gr" />
      </div>
    </div>

    <div class="form-grid2">
      <div class="form-group">
        <label>AccountNo CMS</label>
        <input type="text" id="cl-account" placeholder="— (αυτόματα μετά αποδοχή)" />
      </div>
      <div class="form-group">
        <label>Κατάσταση</label>
        <div class="status-pills">
          <span class="status-pill st-prospect active" onclick="setStatus('prospect',this)">Υποψήφιος</span>
          <span class="status-pill st-negotiate"       onclick="setStatus('negotiate',this)">Σε διαπραγμάτευση</span>
          <span class="status-pill st-accepted"        onclick="setStatus('accepted',this)">Αποδέχτηκε</span>
          <span class="status-pill st-rejected"        onclick="setStatus('rejected',this)">Αρνήθηκε</span>
          <span class="status-pill st-active"          onclick="setStatus('active',this)">Ενεργός</span>
        </div>
      </div>
    </div>

    <div class="form-group" style="margin-bottom:12px;">
      <label>Τιμοκατάλογοι από Ράφι</label>
      <div class="pricelist-tags" id="pl-tags">
        <button class="add-pl-btn" onclick="showPlModal()">+ Προσθήκη από ράφι</button>
      </div>
    </div>

    <div class="offer-terms">
      <div class="offer-terms-title">
        Όροι Προσφοράς
        <span id="offer-num-display" style="font-family:monospace;font-size:11px;color:#6a1b9a;font-weight:700;margin-left:10px;"></span>
      </div>
      <div class="terms-grid">
        <div class="form-group">
          <label>Τρόπος Πληρωμής</label>
          <select id="cl-payment">
            <option value="10">10 ημέρες</option>
            <option value="30" selected>30 ημέρες</option>
            <option value="60">60 ημέρες</option>
          </select>
        </div>
        <div class="form-group">
          <label>Τιμολόγηση</label>
          <select id="cl-invoice">
            <option value="weekly">Εβδομαδιαία</option>
            <option value="monthly" selected>Μηνιαία</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ισχύς Προσφοράς</label>
          <select id="cl-validity">
            <option value="15">15 ημέρες</option>
            <option value="30" selected>30 ημέρες</option>
            <option value="60">60 ημέρες</option>
          </select>
        </div>
      </div>

      <div style="margin-top:14px;">
        <div class="offer-terms-title">Επιπλέον Χρεώσεις</div>
        <div class="surcharges-list" id="surcharges-list"></div>
        <button class="add-surcharge-btn" onclick="addSurcharge()">+ Προσθήκη χρέωσης</button>
      </div>

      <div style="margin-top:14px;">
        <div class="offer-terms-title">Ειδοποίηση Managers</div>
        <div class="managers-list" id="managers-list"></div>
        <button class="add-surcharge-btn" style="margin-top:6px;" onclick="addManager()">+ Προσθήκη email</button>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="resetForm()">Ακύρωση</button>
      <button class="btn btn-orange"  id="preview-btn" onclick="previewPDF()" disabled>📄 Προεπισκόπηση PDF</button>
      <button class="btn btn-green"   id="send-btn"    onclick="sendOffer()"  disabled>✉️ Αποστολή Προσφοράς</button>
      <button class="btn btn-primary" id="save-btn"    onclick="saveClient()" disabled>💾 Αποθήκευση</button>
    </div>
  </div>

  <div class="section-header">
    <span>Λίστα Πελατών (<span id="client-count">0</span>)</span>
  </div>
  <div class="section-body">
    <div class="filter-bar">
      <input class="search-input" type="text" placeholder="🔍 Αναζήτηση επωνυμία / ΑΦΜ / υπεύθυνος..." oninput="filterClients(this.value)" />
      <button class="filter-btn active" onclick="filterByStatus('all',this)">Όλοι</button>
      <button class="filter-btn" onclick="filterByStatus('prospect',this)">🔵 Υποψήφιοι</button>
      <button class="filter-btn" onclick="filterByStatus('negotiate',this)">🟡 Διαπραγμάτευση</button>
      <button class="filter-btn" onclick="filterByStatus('accepted',this)">🟢 Αποδέχτηκαν</button>
      <button class="filter-btn" onclick="filterByStatus('active',this)">🟣 Ενεργοί</button>
      <button class="filter-btn" onclick="filterByStatus('rejected',this)">🔴 Αρνήθηκαν</button>
    </div>
    <div id="clients-list"><div class="empty">Δεν υπάρχουν πελάτες ακόμα</div></div>
  </div>

</div>

<!-- MODAL -->
<div id="pl-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">Επιλογή Τιμοκαταλόγου από Ράφι</div>
    <div id="pl-modal-content"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closePlModal()">Κλείσιμο</button>
    </div>
  </div>
</div>

<script>
const SVC_NAMES = {
  S1003:'✈️↗️ Express Export', S1012:'✈️🇬🇷↙️ Express Import',
  S1010:'🚛↗️ Economy Export', S1041:'🚛🇬🇷↙️ Economy Import'
};
const STATUS_LABELS = {
  prospect:'Υποψήφιος', negotiate:'Σε διαπραγμάτευση',
  accepted:'Αποδέχτηκε', rejected:'Αρνήθηκε', active:'Ενεργός'
};
const STATUS_BG    = { prospect:'#e3f2fd', negotiate:'#fff8e1', accepted:'#e8f5e9', rejected:'#ffebee', active:'#f3e5f5' };
const STATUS_COLOR = { prospect:'#1565c0', negotiate:'#f57f17', accepted:'#2e7d32', rejected:'#c62828', active:'#6a1b9a' };

let clients=[], shelf={}, currentUser=null;
let editingId=null, currentStatus='prospect';
let selectedPls=[], surcharges=[], managers=[];
let filterStatus='all', filterSearch='';

function formatDate(iso){ const d=new Date(iso); if(isNaN(d))return iso; return String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+d.getFullYear(); }
function todayFmt(){ return formatDate(new Date().toISOString()); }
function initials(n){ return (n||'?').split(/\s+/).map(w=>w[0]||'').join('').substring(0,2).toUpperCase(); }
function nextOfferNumber(){
  const y=new Date().getFullYear();
  const nums=clients.map(c=>{ const m=(c.offer_number||'').match(/4A-\d{4}-(\d+)/); return m?parseInt(m[1]):0; });
  return `4A-${y}-${String((nums.length?Math.max(...nums):0)+1).padStart(4,'0')}`;
}

function init(){
  currentUser=JSON.parse(localStorage.getItem('4a_current_user')||'null');
  if(!currentUser){ window.location.href='pricelist-editor.html'; return; }
  document.getElementById('topbar-user').textContent=`${currentUser.name} · ${currentUser.office}`;
  shelf=JSON.parse(localStorage.getItem('4a_shelf')||'{}');
  clients=JSON.parse(localStorage.getItem('4a_clients')||'[]');
  managers=currentUser.email?[currentUser.email]:[];
  updateOfferNum(); renderManagers(); renderClients();
}

function updateOfferNum(){
  const n=editingId?(clients.find(c=>c.id===editingId)?.offer_number||nextOfferNumber()):nextOfferNumber();
  document.getElementById('offer-num-display').textContent=n;
}

function setStatus(s,el){
  currentStatus=s;
  document.querySelectorAll('.status-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); checkForm();
}

function checkForm(){
  const ok=document.getElementById('cl-name').value.trim()&&
           document.getElementById('cl-afm').value.trim()&&
           document.getElementById('cl-email').value.trim();
  document.getElementById('save-btn').disabled=!ok;
  document.getElementById('preview-btn').disabled=!ok;
  document.getElementById('send-btn').disabled=!(ok&&selectedPls.length>0);
}

function resetForm(){
  editingId=null; selectedPls=[]; surcharges=[];
  managers=currentUser?.email?[currentUser.email]:[];
  currentStatus='prospect';
  ['cl-name','cl-afm','cl-contact','cl-email','cl-phone','cl-website','cl-account'].forEach(id=>{ document.getElementById(id).value=''; });
  document.getElementById('cl-payment').value='30';
  document.getElementById('cl-invoice').value='monthly';
  document.getElementById('cl-validity').value='30';
  document.getElementById('form-title').textContent='Νέος Πελάτης';
  document.querySelectorAll('.status-pill').forEach(p=>p.classList.remove('active'));
  document.querySelector('.st-prospect').classList.add('active');
  renderPlTags(); renderSurcharges(); renderManagers(); updateOfferNum(); checkForm();
}

function showPlModal(){
  let html='';
  Object.entries(SVC_NAMES).forEach(([svcId,svcName])=>{
    const items=shelf[svcId]||[];
    if(!items.length)return;
    html+=`<div class="modal-svc-title">${svcName}</div>`;
    items.forEach(p=>{
      const already=selectedPls.find(s=>s.id===p.id);
      html+=`<div class="modal-pl-row">
        <span class="modal-pl-name">${p.name}<span class="modal-pl-date">${p.date||''}</span></span>
        ${already
          ?`<button class="modal-btn-rem" onclick="removePl(${p.id})">✕ Αφαίρεση</button>`
          :`<button class="modal-btn-add" onclick="addPl('${svcId}',${p.id})">+ Προσθήκη</button>`}
      </div>`;
    });
  });
  if(!html)html='<div style="color:#aaa;text-align:center;padding:24px;">Δεν υπάρχουν τιμοκατάλογοι στο ράφι.<br>Δημιούργησε από τον Επεξεργαστή.</div>';
  document.getElementById('pl-modal-content').innerHTML=html;
  document.getElementById('pl-modal').classList.add('open');
}
function closePlModal(){ document.getElementById('pl-modal').classList.remove('open'); checkForm(); }
function addPl(svcId,plId){
  const item=(shelf[svcId]||[]).find(p=>p.id===plId);
  if(!item||selectedPls.find(s=>s.id===plId))return;
  selectedPls.push({...item,service_id:svcId});
  renderPlTags(); showPlModal();
}
function removePl(plId){ selectedPls=selectedPls.filter(p=>p.id!==plId); renderPlTags(); showPlModal(); }
function renderPlTags(){
  document.getElementById('pl-tags').innerHTML=
    selectedPls.map(p=>`<span class="pl-tag">${SVC_NAMES[p.service_id]||p.service_id} — ${p.name}<button onclick="removePl(${p.id})">✕</button></span>`).join('')+
    `<button class="add-pl-btn" onclick="showPlModal()">+ Προσθήκη από ράφι</button>`;
}

function addSurcharge(){ surcharges.push({name:'',value:'',unit:'€/αποστολή'}); renderSurcharges(); }
function renderSurcharges(){
  document.getElementById('surcharges-list').innerHTML=surcharges.map((s,i)=>`
    <div class="surcharge-row">
      <input type="text" value="${s.name}" placeholder="π.χ. Συσκευασία" oninput="surcharges[${i}].name=this.value"/>
      <input type="text" value="${s.value}" placeholder="2.50" oninput="surcharges[${i}].value=this.value"/>
      <select oninput="surcharges[${i}].unit=this.value">
        <option ${s.unit==='€/αποστολή'?'selected':''}>€/αποστολή</option>
        <option ${s.unit==='% επί αξίας'?'selected':''}>% επί αξίας</option>
        <option ${s.unit==='€/παλέτα'?'selected':''}>€/παλέτα</option>
        <option ${s.unit==='€/kg'?'selected':''}>€/kg</option>
      </select>
      <button class="del-btn" onclick="surcharges.splice(${i},1);renderSurcharges()">✕</button>
    </div>`).join('');
}

function addManager(){ const e=prompt('Email manager:'); if(e&&e.includes('@')){ managers.push(e.trim()); renderManagers(); } }
function renderManagers(){
  document.getElementById('managers-list').innerHTML=managers.map((m,i)=>`
    <span class="manager-tag">${m}<button onclick="managers.splice(${i},1);renderManagers()">✕</button></span>`).join('');
}

function saveClient(){
  const name=document.getElementById('cl-name').value.trim();
  const afm=document.getElementById('cl-afm').value.trim();
  const email=document.getElementById('cl-email').value.trim();
  if(!name||!afm||!email){ alert('Συμπλήρωσε Επωνυμία, ΑΦΜ και Email'); return; }
  const offerNum=editingId?(clients.find(c=>c.id===editingId)?.offer_number||nextOfferNumber()):nextOfferNumber();
  const client={
    id:editingId||Date.now(),
    name, afm,
    contact:document.getElementById('cl-contact').value.trim(),
    email,
    phone:document.getElementById('cl-phone').value.trim(),
    website:document.getElementById('cl-website').value.trim(),
    account:document.getElementById('cl-account').value.trim()||'—',
    status:currentStatus,
    pricelists:selectedPls.map(p=>({id:p.id,name:p.name,service_id:p.service_id,markup:p.global_markup||0})),
    surcharges:[...surcharges], managers:[...managers],
    payment:document.getElementById('cl-payment').value,
    invoice:document.getElementById('cl-invoice').value,
    validity:document.getElementById('cl-validity').value,
    offer_number:offerNum,
    user:currentUser.name, office:currentUser.office,
    date:todayFmt(), created_at:new Date().toISOString()
  };
  clients=editingId?clients.map(c=>c.id===editingId?client:c):[client,...clients];
  localStorage.setItem('4a_clients',JSON.stringify(clients));
  alert(`✅ "${name}" αποθηκεύτηκε\nΑρ. Προσφοράς: ${offerNum}`);
  resetForm(); renderClients();
}

function editClient(id){
  const c=clients.find(cl=>cl.id===id); if(!c)return;
  editingId=id;
  document.getElementById('cl-name').value=c.name||'';
  document.getElementById('cl-afm').value=c.afm||'';
  document.getElementById('cl-contact').value=c.contact||'';
  document.getElementById('cl-email').value=c.email||'';
  document.getElementById('cl-phone').value=c.phone||'';
  document.getElementById('cl-website').value=c.website||'';
  document.getElementById('cl-account').value=(c.account!=='—')?c.account:'';
  document.getElementById('cl-payment').value=c.payment||'30';
  document.getElementById('cl-invoice').value=c.invoice||'monthly';
  document.getElementById('cl-validity').value=c.validity||'30';
  currentStatus=c.status||'prospect';
  selectedPls=c.pricelists?[...c.pricelists]:[];
  surcharges=c.surcharges?[...c.surcharges]:[];
  managers=c.managers?[...c.managers]:[];
  document.querySelectorAll('.status-pill').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.st-${currentStatus}`)?.classList.add('active');
  document.getElementById('form-title').textContent=`✏️ Επεξεργασία: ${c.name}`;
  renderPlTags(); renderSurcharges(); renderManagers(); updateOfferNum(); checkForm();
  window.scrollTo({top:0,behavior:'smooth'});
}

function deleteClient(id){
  const c=clients.find(cl=>cl.id===id); if(!c)return;
  if(!confirm(`Διαγραφή "${c.name}";`))return;
  clients=clients.filter(cl=>cl.id!==id);
  localStorage.setItem('4a_clients',JSON.stringify(clients));
  if(editingId===id)resetForm();
  renderClients();
}

function renderClients(){
  const el=document.getElementById('clients-list');
  document.getElementById('client-count').textContent=clients.length;
  let list=[...clients];
  if(filterStatus!=='all')list=list.filter(c=>c.status===filterStatus);
  if(filterSearch){ const q=filterSearch.toLowerCase(); list=list.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.afm||'').includes(q)||(c.contact||'').toLowerCase().includes(q)); }
  if(!list.length){ el.innerHTML='<div class="empty">Δεν βρέθηκαν πελάτες</div>'; return; }
  el.innerHTML=list.map(c=>{
    const plStr=(c.pricelists||[]).map(p=>`${SVC_NAMES[p.service_id]||p.service_id}${p.markup?' '+p.markup+'%':''}`).join(' · ')||'—';
    const isRenewal=c.status==='active'||c.status==='rejected';
    return `<div class="client-item">
      <div class="client-avatar" style="background:${STATUS_BG[c.status]||'#f0f0f0'};color:${STATUS_COLOR[c.status]||'#555'};">${initials(c.name)}</div>
      <div class="client-info">
        <div class="client-name">
          ${c.name}
          <span class="status-pill st-${c.status}" style="font-size:10px;padding:2px 8px;cursor:default;">${STATUS_LABELS[c.status]||c.status}</span>
          ${isRenewal?'<span class="renewal-badge">↻ Ανανέωση</span>':''}
          <span class="offer-badge">${c.offer_number||'—'}</span>
        </div>
        <div class="client-meta">ΑΦΜ: ${c.afm||'—'} · ${c.contact||'—'} · ${c.email||'—'}${c.phone?' · '+c.phone:''}${c.website?' · '+c.website:''} · ${c.date||'—'} · ${c.user||'—'} · ${c.office||'—'}</div>
        <div class="client-pls">📋 ${plStr}</div>
      </div>
      <div class="client-actions">
        ${c.status==='active'?`<button class="action-btn cms" onclick="exportCMS(${c.id})">↓ CMS Export</button>`:''}
        <button class="action-btn send" onclick="editClient(${c.id})">✉️ Προσφορά</button>
        <button class="action-btn edit" onclick="editClient(${c.id})">✏️ Edit</button>
        <button class="action-btn del"  onclick="deleteClient(${c.id})">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function filterByStatus(s,btn){ filterStatus=s; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderClients(); }
function filterClients(q){ filterSearch=q; renderClients(); }
function exportCMS(id){ alert('CMS Export — επόμενο βήμα (TSV download)'); }
function sendOffer(){ alert('Αποστολή Προσφοράς — επόμενο βήμα (SMTP + PDF)'); }
function previewPDF(){ alert('Προεπισκόπηση PDF — επόμενο βήμα'); }
function doLogout(){ window.location.href='pricelist-editor.html'; }

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){
    shelf=JSON.parse(localStorage.getItem('4a_shelf')||'{}');
    clients=JSON.parse(localStorage.getItem('4a_clients')||'[]');
    renderClients();
  }
});

init();
</script>
</body>
</html>
