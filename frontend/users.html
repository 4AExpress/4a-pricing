<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; color: #1a1a1a; min-height: 100vh; }

  .section-body { background: white; border: 1px solid #ddd; border-top: none; border-radius: 0 0 4px 4px; padding: 16px; margin-bottom: 20px; }
  .form-grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }

  /* USERS LIST */

  .user-item:last-child { border-bottom: none; }

  .toggle { position:relative; display:inline-block; width:36px; height:20px; }
  .toggle input { opacity:0; width:0; height:0; position:absolute; }
  .toggle-slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#ccc; border-radius:20px; transition:.2s; }
  .toggle-slider:before { position:absolute; content:""; height:14px; width:14px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.2s; }
  .toggle input:checked + .toggle-slider { background:#43a047; }
  .toggle input:checked + .toggle-slider:before { transform:translateX(16px); }
</style>

<script>
const API = 'https://4aexpress.com/api';
const STATIONS = { ATH:'Αθήνα', LCA:'Λάρνακα', NIC:'Λευκωσία', QLI:'Λεμεσός' };
const ROLE_DEFAULTS = {
  administrator: { view:1, add:1, edit:1, delete:1, export:1, all:1 },
  manager:       { view:1, add:1, edit:1, delete:0, export:1, all:0 },
  user:          { view:1, add:0, edit:0, delete:0, export:0, all:0 },
};
const ROLE_LABELS = { administrator:'Administrator', manager:'Manager', user:'User' };

let currentUser = null;
let users = [];
let editingId = null;

function init() {
  currentUser = JSON.parse(localStorage.getItem('4a_current_user') || 'null');
  if (!currentUser) { window.location.href = 'pricelist-editor.html'; return; }
  document.getElementById('topbar-user').textContent = `${currentUser.name} · ${currentUser.office}`;
  if (currentUser.role !== 'administrator') {
    document.getElementById('form-body').innerHTML = '<div class="no-access">⛔ Μόνο οι Administrator μπορούν να διαχειριστούν χρήστες.</div>';
  }
  loadUsers();
}

async function loadUsers() {
  try {
    const r = await fetch(`${API}/users.php?v=${Date.now()}`);
    users = await r.json();
  } catch(e) { users = []; }
  document.getElementById('user-count').textContent = users.length;
  renderUsers();
}
function validateCode(el) {
  const v = el.value.toUpperCase();
  el.value = v;
  const ok = /^E\d{4}$/.test(v);
  document.getElementById('code-msg').textContent = v && !ok ? 'Μορφή: E + 4 ψηφία (π.χ. E1003)' : '';
  return ok;
}
function onRoleChange() {
  const role = document.getElementById('u-role').value;
  const d = ROLE_DEFAULTS[role];
  document.getElementById('p-view').checked   = !!d.view;
  document.getElementById('p-add').checked    = !!d.add;
  document.getElementById('p-edit').checked   = !!d.edit;
  document.getElementById('p-delete').checked = !!d.delete;
  document.getElementById('p-export').checked = !!d.export;
  document.getElementById('p-all').checked    = !!d.all;

  // Admin → όλοι σταθμοί locked
  const isAdmin = role === 'administrator';
  document.querySelectorAll('.station-check').forEach(el => {
    const cb = el.querySelector('input');
    if (isAdmin) {
      cb.checked = true;
      el.classList.add('checked', 'locked');
    } else {
      el.classList.remove('locked');
    }
    el.classList.toggle('checked', cb.checked);
  });
  document.getElementById('stations-note').textContent = isAdmin ? '* Administrator έχει πρόσβαση σε όλους τους σταθμούς' : '';
}

function onStationChange() {
  document.querySelectorAll('.station-check').forEach(el => {
    const cb = el.querySelector('input');
    el.classList.toggle('checked', cb.checked);
  });
}

function onAllChange() {
  if (document.getElementById('p-all').checked) {
    ['p-view','p-add','p-edit','p-delete','p-export'].forEach(id => {
      document.getElementById(id).checked = true;
    });
  }
}

function getSelectedStations() {
  const role = document.getElementById('u-role').value;
  if (role === 'administrator') return 'ATH,LCA,NIC,QLI';
  return Array.from(document.querySelectorAll('.station-check input:checked'))
    .map(cb => cb.value).join(',') || 'ATH';
}

function checkForm() {
  const ok = (editingId || /^E\d{4}$/.test(document.getElementById('u-code')?.value||'')) &&
             document.getElementById('u-name').value.trim() &&
             document.getElementById('u-email').value.trim() &&
             document.getElementById('u-pin').value.trim().length === 4;
  document.getElementById('save-btn').disabled = !ok;
}

function resetForm() {
  editingId = null;
  ['u-code','u-name','u-email','u-pin'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('u-role').value = 'user';
  document.getElementById('form-title').textContent = 'Νέος Χρήστης';
  // Reset stations
  document.querySelectorAll('.station-check').forEach(el => {
    const cb = el.querySelector('input');
    cb.checked = cb.value === 'ATH';
    el.classList.toggle('checked', cb.value === 'ATH');
    el.classList.remove('locked');
  });
  document.getElementById('stations-note').textContent = '';
  onRoleChange();
  checkForm();
}
async function saveUser() {
 const code  = document.getElementById('u-code').value.trim();
  const name  = document.getElementById('u-name').value.trim();
  const email = document.getElementById('u-email').value.trim();
  const pin   = document.getElementById('u-pin').value.trim();
  const role  = document.getElementById('u-role').value;
  const stations = getSelectedStations();
  // office = πρώτος σταθμός
  const firstStation = stations.split(',')[0];
  const office = STATIONS[firstStation] || 'Αθήνα';
  if (!name || !email || pin.length !== 4) { alert('Συμπλήρωσε όλα τα υποχρεωτικά πεδία'); return; }
  const payload = {
    action: editingId ? 'edit' : 'add',
    id: editingId,
   user_code: code,
    name, email, pin, role, office, stations,
    can_view:   document.getElementById('p-view').checked   ? 1 : 0,
    can_add:    document.getElementById('p-add').checked    ? 1 : 0,
    can_edit:   document.getElementById('p-edit').checked   ? 1 : 0,
    can_delete: document.getElementById('p-delete').checked ? 1 : 0,
    can_export: document.getElementById('p-export').checked ? 1 : 0,
    can_all:    document.getElementById('p-all').checked    ? 1 : 0,
  };
  try {
    const r = await fetch(`${API}/users.php`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    if (d.ok) {
      alert(`✅ Χρήστης "${name}" αποθηκεύτηκε!`);
      resetForm();
      loadUsers();
    } else {
      alert('Σφάλμα: ' + (d.error || 'Άγνωστο'));
    }
  } catch(e) { alert('Σφάλμα σύνδεσης με API'); }
}

function editUser(id) {
  const u = users.find(x => x.id === id);
  if (!u) return;
  editingId = id;
  document.getElementById('u-code').value  = u.user_code || '';
  document.getElementById('u-name').value  = u.name  || '';
  document.getElementById('u-email').value = u.email || '';
  document.getElementById('u-pin').value   = '';
  document.getElementById('u-role').value  = u.role  || 'user';

  // Stations
  const userStations = (u.stations || 'ATH').split(',');
  document.querySelectorAll('.station-check').forEach(el => {
    const cb = el.querySelector('input');
    cb.checked = userStations.includes(cb.value);
    el.classList.toggle('checked', cb.checked);
    el.classList.remove('locked');
  });
  if (u.role === 'administrator') {
    document.querySelectorAll('.station-check').forEach(el => el.classList.add('locked'));
    document.getElementById('stations-note').textContent = '* Administrator έχει πρόσβαση σε όλους τους σταθμούς';
  }

  document.getElementById('p-view').checked   = !!parseInt(u.can_view);
  document.getElementById('p-add').checked    = !!parseInt(u.can_add);
  document.getElementById('p-edit').checked   = !!parseInt(u.can_edit);
  document.getElementById('p-delete').checked = !!parseInt(u.can_delete);
  document.getElementById('p-export').checked = !!parseInt(u.can_export);
  document.getElementById('p-all').checked    = !!parseInt(u.can_all);

  document.getElementById('form-title').textContent = `✏️ Επεξεργασία: ${u.name}`;
  document.getElementById('save-btn').disabled = false;
  window.scrollTo({top:0, behavior:'smooth'});
}

async function deleteUser(id) {
  const u = users.find(x => x.id === id);
  if (!u || !confirm(`Διαγραφή χρήστη "${u.name}";`)) return;
  await fetch(`${API}/users.php`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({action:'delete', id})
  });
  loadUsers();
}

function renderUsers() {
  const el = document.getElementById('users-list');
  if (!users.length) { el.innerHTML = '<div class="empty">Δεν υπάρχουν χρήστες</div>'; return; }
  const ROLE_COLORS = { administrator:'#cc0000', manager:'#1565c0', user:'#555' };
  const initials = n => (n||'?').split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase();

  const visibleUsers = users.filter(u => 
  currentUser.role === 'administrator' || u.role !== 'administrator'
);
el.innerHTML = visibleUsers.map(u => {
    const stationBadges = (u.stations||'ATH').split(',')
      .map(s => `<span class="station-badge">${s}</span>`).join(' ');
    const perms = [
      {k:'View',v:u.can_view},{k:'Add',v:u.can_add},{k:'Edit',v:u.can_edit},
      {k:'Delete',v:u.can_delete},{k:'Export',v:u.can_export},{k:'All',v:u.can_all},
    ];
    const isMe = u.name === currentUser.name;
    return `
    <div class="user-item">
      <div class="user-avatar" style="background:${ROLE_COLORS[u.role]||'#555'}20;color:${ROLE_COLORS[u.role]||'#555'};">
        ${initials(u.name)}
      </div>
      <div class="user-info">
        <div class="user-name">
          <span style="font-family:monospace;font-size:11px;background:#f0f0f0;padding:2px 6px;border-radius:4px;color:#555;">${u.user_code||''}</span>
${u.name} ${isMe?'<span style="font-size:10px;color:#888;">(εσύ)</span>':''}
          <span class="role-badge role-${u.role}">${ROLE_LABELS[u.role]||u.role}</span>
          ${stationBadges}
        </div>
        <div class="user-meta">${u.email||'—'}</div>
        <div class="user-perms">
          ${perms.map(p=>`<span class="perm-badge ${parseInt(p.v)?'perm-on':'perm-off'}">${p.k}</span>`).join('')}
        </div>
      </div>
      <div class="user-actions">
        ${currentUser.role==='administrator'?`
          <button class="action-btn" onclick="editUser(${u.id})">✏️ Edit</button>
          ${!isMe?`<button class="action-btn del" onclick="deleteUser(${u.id})">Del</button>`:''}
        `:''}
      </div>
    </div>`;
  }).join('');
}

function showTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-users').style.display   = name === 'users'   ? '' : 'none';
  document.getElementById('tab-offices').style.display = name === 'offices' ? '' : 'none';
  if (name === 'offices' && !offices.length) loadOffices();
}

// ─── OFFICES ──────────────────────────────────────────────────────────────────
let offices = [];
let editingOfficeId = null;

async function loadOffices() {
  try {
    const r = await fetch(`${API}/offices.php?v=${Date.now()}`);
    offices = await r.json();
  } catch(e) { offices = []; }
  document.getElementById('office-count').textContent = offices.length;
  renderOffices();
}

function renderOffices() {
  const tbody = document.getElementById('offices-tbody');
  if (!offices.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:#bbb;">Δεν υπάρχουν γραφεία</td></tr>';
    return;
  }
  tbody.innerHTML = offices.map(o => `
    <tr>
      <td><span class="prefix-badge">${o.prefix}</span></td>
      <td>${o.city}</td>
      <td>${o.tel || '—'}</td>
      <td>${o.email || '—'}</td>
      <td>${o.manager || '—'}</td>
      <td>
        <label class="toggle" title="${parseInt(o.active) ? 'Ενεργό' : 'Ανενεργό'}">
          <input type="checkbox" ${parseInt(o.active) ? 'checked' : ''}
            onchange="toggleOfficeActive(${o.id}, this.checked)" />
          <span class="toggle-slider"></span>
        </label>
      </td>
      <td><button class="action-btn" onclick="editOffice(${o.id})">✏️ Edit</button></td>
    </tr>`).join('');
}

function checkOfficeForm() {
  const ok = document.getElementById('o-prefix').value.trim() &&
             document.getElementById('o-city').value.trim();
  document.getElementById('office-save-btn').disabled = !ok;
}

function resetOfficeForm() {
  editingOfficeId = null;
  ['o-prefix','o-city','o-tel','o-email','o-manager','o-addr','o-company','o-vat'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('o-active').value = '1';
  document.getElementById('office-form-title').textContent = 'Νέο Γραφείο';
  document.getElementById('office-save-btn').disabled = true;
}

function editOffice(id) {
  const o = offices.find(x => x.id == id);
  if (!o) return;
  editingOfficeId = id;
  document.getElementById('o-prefix').value  = o.prefix  || '';
  document.getElementById('o-city').value    = o.city    || '';
  document.getElementById('o-tel').value     = o.tel     || '';
  document.getElementById('o-email').value   = o.email   || '';
  document.getElementById('o-manager').value = o.manager || '';
  document.getElementById('o-addr').value    = o.addr    || '';
  document.getElementById('o-company').value = o.company || '';
  document.getElementById('o-vat').value     = o.vat     || '';
  document.getElementById('o-active').value  = parseInt(o.active) ? '1' : '0';
  document.getElementById('office-form-title').textContent = `✏️ Επεξεργασία: ${o.city}`;
  document.getElementById('office-save-btn').disabled = false;
  window.scrollTo({top:0, behavior:'smooth'});
}

async function saveOffice() {
  const payload = {
    action:  'save',
    id:      editingOfficeId || null,
    prefix:  document.getElementById('o-prefix').value.trim(),
    city:    document.getElementById('o-city').value.trim(),
    tel:     document.getElementById('o-tel').value.trim(),
    email:   document.getElementById('o-email').value.trim(),
    manager: document.getElementById('o-manager').value.trim(),
    addr:    document.getElementById('o-addr').value.trim(),
    company: document.getElementById('o-company').value.trim(),
    vat:     document.getElementById('o-vat').value.trim(),
    active:  parseInt(document.getElementById('o-active').value),
  };
  try {
    const r = await fetch(`${API}/offices.php`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    if (d.ok) { resetOfficeForm(); loadOffices(); }
    else { alert('Σφάλμα: ' + (d.error || 'Άγνωστο')); }
  } catch(e) { alert('Σφάλμα σύνδεσης με API'); }
}

async function toggleOfficeActive(id, active) {
  const o = offices.find(x => x.id == id);
  if (!o) return;
  await fetch(`${API}/offices.php`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ action:'save', ...o, id, active: active ? 1 : 0 })
  });
  loadOffices();
}

function doLogout() { window.location.href = 'pricelist-editor.html'; }
init();
</script>
