name: Καθημερινή Ενημέρωση Επίναυλου Καυσίμων

on:
  schedule:
    - cron: '0 5 * * *'  # 07:00 EET κάθε μέρα
  workflow_dispatch:

jobs:
  update-fuel-surcharge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: pip install selenium webdriver-manager

      - name: Run fetch script
        run: python poc/fetch_fuel_surcharge.py --output data/fuel_surcharge_cache.json

      - name: Commit αν άλλαξαν τα δεδομένα
        run: |
          git config user.name  "4A Automation"
          git config user.email "automation@4aexpress.com"
          git add data/fuel_surcharge_cache.json
          git diff --staged --quiet || git commit -m "Auto: ενημέρωση επίναυλου καυσίμων $(date +'%Y-%m-%d')"
          git push
